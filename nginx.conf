server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas devuelven index.html si el archivo no existe físicamente.
    # Esto es necesario para una SPA con react-router: si alguien entra
    # directo a una URL tipo /containers, nginx no va a encontrar ese archivo
    # en disco, y sin esta línea devolvería un 404 en vez de dejar que React
    # maneje la ruta del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Los assets que Vite genera (JS/CSS) ya tienen un hash en el nombre
    # de archivo (ej: index-Bgk3WnJ0.js) — si cambia el contenido, cambia
    # el nombre. Por eso es seguro cachearlos "para siempre" en el navegador:
    # nunca vas a servir una versión vieja por error.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}